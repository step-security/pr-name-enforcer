name: "units-test"
on:
  pull_request:

jobs:
  # unit tests
  units:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - run: yarn install --frozen-lockfile
    - run: yarn all

  # test action works running from the graph
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: ./
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        regex: ".*"
